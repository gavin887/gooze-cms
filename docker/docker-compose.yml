version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: gooze-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gooze-admin}
      MYSQL_USER: ${MYSQL_USER:-gooze-admin}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-gooze-admin}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../gooze-vben-api/docs/sql/default.sql:/docker-entrypoint-initdb.d/01-default.sql
      - ../gooze-vben-api/docs/sql/content.sql:/docker-entrypoint-initdb.d/02-content.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - gooze-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123456}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gooze-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - gooze-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    container_name: gooze-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-gooze-admin}
      APP_ENV: ${APP_ENV:-production}
      APP_ADDR: ${APP_ADDR:-:18002}
      APP_TIMEOUT: ${APP_TIMEOUT:-1}
      APP_ROUTER_PREFIX: ${APP_ROUTER_PREFIX:-/api/v1}
      DB_DRIVER: ${DB_DRIVER:-mysql}
      DB_DSN: ${DB_DSN:-gooze-admin:gooze-admin@tcp(mysql:3306)/gooze-admin?charset=utf8mb4&parseTime=True&loc=Local&timeout=5s}
      DB_MAX_IDLE_CONN: ${DB_MAX_IDLE_CONN:-10}
      DB_MAX_CONN: ${DB_MAX_CONN:-200}
      DB_LOG_LEVEL: ${DB_LOG_LEVEL:-3}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-123456}
      JWT_EXPIRE: ${JWT_EXPIRE:-86400}
      OSS_TYPE: ${OSS_TYPE:-local}
      OSS_URL: ${OSS_URL:-http://localhost:18002}
      LOG_PATH: ${LOG_PATH:-./logs/}
      LOG_MODE: ${LOG_MODE:-both}
    ports:
      - "${BACKEND_PORT:-18002}:18002"
    volumes:
      - backend-logs:/app/logs
      - backend-static:/app/static
    networks:
      - gooze-network

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    container_name: gooze-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      API_URL: ${API_URL:-/api/v1}
      API_BASE_URL: ${API_BASE_URL:-http://backend:18002}
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    networks:
      - gooze-network

volumes:
  mysql-data:
  redis-data:
  backend-logs:
  backend-static:

networks:
  gooze-network:
    driver: bridge
